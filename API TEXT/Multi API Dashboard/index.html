<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>multi api dashboard</title>
</head>
<body class="bg-gray-50 min-h-screen"></body>
<div class="max-w-4xl mx-auto px-4 py-8">
  <h1 class="text-2xl font-bold mb-6">My Dashboard</h1>

  <!-- Section 4: Dashboard stat cards (loaded on page load) -->
  <div class="grid grid-cols-3 gap-4 mb-8">
    <div id="stat-users" class="bg-white border rounded-xl p-4 text-center">
      <p class="text-xs text-gray-400 mb-1">Users</p>
      <p class="text-2xl font-bold text-gray-700">—</p>
    </div>
    <div id="stat-posts" class="bg-white border rounded-xl p-4 text-center">
      <p class="text-xs text-gray-400 mb-1">Posts</p>
      <p class="text-2xl font-bold text-gray-700">—</p>
    </div>
    <div id="stat-todos" class="bg-white border rounded-xl p-4 text-center">
      <p class="text-xs text-gray-400 mb-1">Todos</p>
      <p class="text-2xl font-bold text-gray-700">—</p>
    </div>
  </div>

  <!-- Section 1: Country Explorer -->
  <section class="bg-white border rounded-xl p-6 mb-6">
    <h2 class="font-semibold text-lg mb-4">Country Explorer</h2>
    <div class="flex gap-2 mb-4">
      <input id="countryInput" type="text" placeholder="e.g. Nigeria"
        class="flex-1 border rounded-lg px-3 py-2 text-sm
               focus:outline-none focus:ring-2 focus:ring-blue-300" />
      <button onclick="searchCountry()"
        class="bg-blue-500 text-white px-4 py-2 rounded-lg text-sm
               hover:bg-blue-600">
        Search
      </button>
    </div>
    <div id="countryResult"></div>
  </section>

  <!-- Section 2: Pokémon Explorer -->
  <section class="bg-white border rounded-xl p-6 mb-6">
    <h2 class="font-semibold text-lg mb-4">Pokémon Explorer</h2>
    <div class="flex gap-2 mb-4">
      <input id="pokemonInput" type="text" placeholder="e.g. pikachu"
        class="flex-1 border rounded-lg px-3 py-2 text-sm
               focus:outline-none focus:ring-2 focus:ring-yellow-300" />
      <button onclick="searchPokemon()"
        class="bg-yellow-400 text-white px-4 py-2 rounded-lg text-sm
               hover:bg-yellow-500">
        Search
      </button>
    </div>
    <div id="pokemonResult"></div>
  </section>

  <!-- Section 3: Post Publisher -->
  <section class="bg-white border rounded-xl p-6">
    <h2 class="font-semibold text-lg mb-4">Post Publisher</h2>
    <div class="space-y-3">
      <input id="pubName" type="text" placeholder="Your name"
        class="w-full border rounded-lg px-3 py-2 text-sm
               focus:outline-none focus:ring-2 focus:ring-green-300" />
      <input id="pubTitle" type="text" placeholder="Post title"
        class="w-full border rounded-lg px-3 py-2 text-sm
               focus:outline-none focus:ring-2 focus:ring-green-300" />
      <textarea id="pubBody" placeholder="Post body..." rows="3"
        class="w-full border rounded-lg px-3 py-2 text-sm
               focus:outline-none focus:ring-2 focus:ring-green-300">
      </textarea>
      <button id="publishBtn" onclick="publishPost()"
        class="w-full bg-green-500 text-white py-2 rounded-lg text-sm
               hover:bg-green-600">
        Publish
      </button>
    </div>
    <div id="publishResult" class="mt-3"></div>
  </section>
</div>


    <script src="script.js"></script>
    
</body>
</html>
